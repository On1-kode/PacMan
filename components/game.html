<div class="game-screen hidden">
  <div class="game-container">
    <canvas id="game" width="420" height="420"></canvas>
  </div>
  <div class="info-panel">
    <div class="score-container">
      <span>Рахунок:</span>
      <span id="score">0</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>
  </div>
  <div class="controls">
    <button onclick="restart()">🔄 Рестарт</button>
    <button onclick="pauseGame()">⏸️ Пауза</button>
    <button onclick="showMenu()">🏠 Меню</button>
  </div>
</div>
