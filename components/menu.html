<div class="menu-screen">
  <div class="level-panel">
    <div class="level-card">
      <h3>Оберіть складність</h3>
      <div class="tabs">
        <button class="tab-button" data-level="easy" onclick="selectLevelTab('easy')">Легкий</button>
        <button class="tab-button active" data-level="normal" onclick="selectLevelTab('normal')">Середній</button>
        <button class="tab-button" data-level="hard" onclick="selectLevelTab('hard')">Важкий</button>
      </div>
      <div class="tab-panels">
        <div class="tab-panel" id="tab-easy">
          <p>Менше привидів, повільніша швидкість та легка карта.</p>
          <button class="start-button" onclick="startGame('easy')">▶️ Розпочати Легкий</button>
        </div>
        <div class="tab-panel active" id="tab-normal">
          <p>Збалансована складність із чотирма привидами.</p>
          <button class="start-button" onclick="startGame('normal')">▶️ Розпочати Середній</button>
        </div>
        <div class="tab-panel" id="tab-hard">
          <p>Швидші привиди, складніша карта та максимальний виклик.</p>
          <button class="start-button" onclick="startGame('hard')">▶️ Розпочати Важкий</button>
        </div>
      </div>
      <div class="menu-note">Кожна вкладка відкриває окрему інформацію для відповідного рівня.</div>
    </div>
  </div>
</div>
