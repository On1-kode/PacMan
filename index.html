<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacman ULTRA</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h2>Pacman</h2>
  <div class="level-panel">
    <div class="level-card">
      <h3>Оберіть складність</h3>
      <p>Натисніть кнопку, щоб почати гру.</p>
      <div class="level-buttons">
        <button class="level-button" data-level="easy" onclick="selectLevel('easy')">Легкий</button>
        <button class="level-button active" data-level="normal" onclick="selectLevel('normal')">Середній</button>
        <button class="level-button" data-level="hard" onclick="selectLevel('hard')">Важкий</button>
      </div>
      <button class="start-button" onclick="startGame()">▶️ Розпочати</button>
      <div class="menu-note">Легкий — менше привидів. Важкий — швидші привиди та складніша карта.</div>
    </div>
  </div>
  <div class="game-container">
    <canvas id="game" width="420" height="420"></canvas>
  </div>
  <div class="info-panel">
    <div class="score-container">
      <span>Рахунок:</span>
      <span id="score">0</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>
  </div>
  <div class="controls">
    <button onclick="restart()">🔄 Рестарт</button>
    <button onclick="pauseGame()">⏸️ Пауза</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
